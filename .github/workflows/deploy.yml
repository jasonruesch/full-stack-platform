name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploy to Fly.io. Requires a FLY_API_TOKEN repository secret
# (create with: fly tokens create deploy).
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
